<nav class="navbar">
  <div class="navbar-left">
    <div class="nav-logo">
      <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="url(#nav-grad)"/>
        <path d="M10 20h20M20 10v20M14 14l12 12M26 14L14 26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <defs>
          <linearGradient id="nav-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/>
            <stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="nav-brand">Fintosa Board</span>
    </div>

    <div class="nav-breadcrumb">
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-item">Sprint Board</span>
    </div>
  </div>

  <div class="navbar-right">
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span class="live-text">Real-time</span>
    </div>

    <div class="user-menu-wrap" (clickOutside)="showUserMenu = false">
      <button class="user-avatar-btn" (click)="toggleMenu()" id="user-menu-btn">
        <div class="avatar-circle">{{ userInitials }}</div>
        <div class="user-info">
          <span class="user-name">{{ user?.name }}</span>
          <span class="user-role">{{ user?.role }}</span>
        </div>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" [class.rotated]="showUserMenu">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <div class="user-dropdown" *ngIf="showUserMenu">
        <div class="dropdown-header">
          <div class="dropdown-avatar">{{ userInitials }}</div>
          <div>
            <div class="dropdown-name">{{ user?.name }}</div>
            <div class="dropdown-email">{{ user?.email }}</div>
          </div>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item logout-item" (click)="logout()" id="logout-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </div>
  </div>
</nav>
