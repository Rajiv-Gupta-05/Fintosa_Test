<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-panel" role="dialog" aria-modal="true">
    <!-- Modal header -->
    <div class="modal-header">
      <div class="modal-title-wrap">
        <div class="modal-icon">{{ isEdit ? '✏️' : '✨' }}</div>
        <h2>{{ isEdit ? 'Edit Task' : 'Create New Task' }}</h2>
      </div>
      <button class="modal-close" (click)="close.emit()" id="modal-close-btn" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="modal-body">

      <!-- Title -->
      <div class="form-group">
        <label for="task-title">
          Task Title <span class="required">*</span>
        </label>
        <input
          id="task-title"
          type="text"
          formControlName="title"
          placeholder="Enter a clear, concise title..."
          [class.invalid]="titleCtrl?.invalid && titleCtrl?.touched"
        />
        <span class="field-error" *ngIf="titleCtrl?.invalid && titleCtrl?.touched">
          Task title should not be empty
        </span>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="task-desc">Description</label>
        <textarea
          id="task-desc"
          formControlName="description"
          placeholder="Add more context about this task..."
          rows="3"
        ></textarea>
      </div>

      <!-- Priority + Status row -->
      <div class="form-row">
        <div class="form-group">
          <label for="task-priority">Priority</label>
          <div class="priority-selector">
            <button
              type="button"
              *ngFor="let p of priorities"
              class="priority-btn"
              [class.selected]="form.get('priority')?.value === p.value"
              [style.--p-color]="p.color"
              (click)="form.get('priority')?.setValue(p.value)"
              [id]="'priority-' + p.value.toLowerCase()"
            >
              {{ p.label }}
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="task-status">Status</label>
          <select id="task-status" formControlName="status" class="styled-select">
            <option *ngFor="let s of statuses" [value]="s.value">{{ s.label }}</option>
          </select>
        </div>
      </div>

      <!-- Assignee + Due Date row -->
      <div class="form-row">
        <div class="form-group">
          <label for="task-assignee">Assign To</label>
          <select id="task-assignee" formControlName="assignedTo" class="styled-select">
            <option value="">Unassigned</option>
            <option *ngFor="let user of users" [value]="user._id">{{ user.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="task-due">Due Date</label>
          <input
            id="task-due"
            type="date"
            formControlName="dueDate"
            [min]="todayDate"
          />
        </div>
      </div>

      <!-- Footer actions -->
      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="close.emit()" id="cancel-modal-btn">
          Cancel
        </button>
        <button type="submit" class="btn-save" [disabled]="isSubmitting" id="save-task-btn">
          <span class="spinner-sm" *ngIf="isSubmitting"></span>
          <span>{{ isEdit ? 'Save Changes' : 'Create Task' }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
