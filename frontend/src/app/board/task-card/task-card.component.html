<div
  class="task-card"
  [class.is-dragging]="isDragging"
  [class.is-done]="task.status === 'DONE'"
  draggable="true"
  (dragstart)="onDragStart($event)"
  (dragend)="onDragEnd()"
  (click)="closeMenu()"
>
  <!-- Priority stripe -->
  <div class="priority-stripe" [ngClass]="priorityClass"></div>

  <!-- Card header -->
  <div class="card-header">
    <span class="priority-badge" [ngClass]="priorityClass">{{ priorityLabel }}</span>
    <div class="card-actions" (clickOutside)="closeMenu()">
      <button class="menu-btn" (click)="toggleMenu($event)" id="task-menu-{{task._id}}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
      </button>
      <div class="context-menu" *ngIf="showMenu" (click)="$event.stopPropagation()">
        <button class="menu-item" (click)="onEdit($event)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>
        <div class="menu-divider"></div>
        <div class="menu-section-label">Move to</div>
        <button
          *ngFor="let s of availableStatuses()"
          class="menu-item status-item"
          (click)="onStatusMove(s, $event)"
        >
          <span class="status-dot" [ngClass]="'dot-' + s.toLowerCase()"></span>
          {{ statusLabel(s) }}
        </button>
        <div class="menu-divider"></div>
        <button class="menu-item menu-delete" (click)="onDelete($event)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
      </div>
    </div>
  </div>

  <!-- Task title -->
  <h3 class="card-title" [class.done-text]="task.status === 'DONE'">{{ task.title }}</h3>

  <!-- Description -->
  <p class="card-desc" *ngIf="task.description">{{ task.description }}</p>

  <!-- Card footer -->
  <div class="card-footer">
    <!-- Due date -->
    <div class="due-date" *ngIf="task.dueDate" [class.overdue]="isOverdue" [class.due-soon]="isDueSoon">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>{{ formattedDueDate }}</span>
      <span class="overdue-tag" *ngIf="isOverdue">Overdue</span>
    </div>

    <!-- Assignee -->
    <div class="assignee" *ngIf="task.assignedTo" [title]="$any(task.assignedTo)?.name">
      <div class="assignee-avatar" [style.background]="assigneeColor">
        {{ assigneeInitials }}
      </div>
    </div>
  </div>
</div>
